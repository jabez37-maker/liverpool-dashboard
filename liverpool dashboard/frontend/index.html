<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Liverpool Dashboard</title>

  <link rel="stylesheet" href="styles.css"/>

</head>

<body>

<div class="container">

  <!-- HERO -->

  <div class="hero">

    <div class="hero-left">

      <img id="crest" src="" alt="crest"/>

      <div>

        <h1 id="club-name">Loading...</h1>

        <p id="stadium"></p>

        <p id="manager"></p>

      </div>

    </div>

  </div>

  <!-- METRICS -->

  <div class="metrics">

    <div class="metric-card">
      <h2 id="wins">0</h2>
      <p>Wins</p>
    </div>

    <div class="metric-card">
      <h2 id="draws">0</h2>
      <p>Draws</p>
    </div>

    <div class="metric-card">
      <h2 id="losses">0</h2>
      <p>Losses</p>
    </div>

    <div class="metric-card">
      <h2 id="points">0</h2>
      <p>Points</p>
    </div>

  </div>

  <!-- NEXT MATCH -->

  <div class="section">

    <h2>Next Match</h2>

    <div id="next-match" class="match-card">
      Loading...
    </div>

  </div>

  <!-- RECENT MATCHES -->

  <div class="section">

    <h2>Recent Matches</h2>

    <div id="recent-matches"></div>

  </div>

  <!-- PLAYERS -->

  <div class="section">

    <h2>Squad Players</h2>

    <div class="players" id="players"></div>

  </div>

  <!-- STANDINGS -->
   

  <div class="section">

    <h2>Premier League Standings</h2>

    <div id="standings"></div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
